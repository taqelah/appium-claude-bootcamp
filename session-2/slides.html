<h2 id="three-kinds-of-waits">Three kinds of waits</h2>
<table>
<thead>
<tr>
<th>Wait</th>
<th>What it does</th>
<th>When</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Implicit</strong></td>
<td>Global &quot;retry find for N s&quot; on <em>every</em> element lookup</td>
<td>Set once; blunt instrument</td>
</tr>
<tr>
<td><strong>Explicit</strong></td>
<td>Wait for a <strong>specific condition</strong> on a specific element</td>
<td>The default tool <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
<tr>
<td><strong>Fluent</strong></td>
<td>Explicit + custom <strong>poll interval</strong> + ignored exceptions</td>
<td>Fine-tuning</td>
</tr>
</tbody>
</table>
<br />
<blockquote>
<p><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> <strong>Never <code>sleep(3)</code></strong> — too short → flaky, too long → slow. Wait for a <strong>condition</strong>, not a clock.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="implicit-waits--one-global-setting">Implicit waits — one global setting</h2>
<p>Set <strong>once</strong> after connecting; every <code>find_element</code> then <strong>retries</strong> for up to N seconds.</p>
<div class="cols">
<div>
<p><strong>Python</strong> (Appium-Python-Client)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">driver = webdriver.Remote(APPIUM_URL, options=options)
driver.implicitly_wait(<span class="hljs-number">10</span>)     <span class="hljs-comment"># seconds — set ONCE</span>

<span class="hljs-comment"># every lookup now polls for up to 10s</span>
<span class="hljs-comment"># before raising NoSuchElement:</span>
login = driver.find_element(*LOGIN_BTN)
login.click()
</code></pre>
</div>
<div>
<p><strong>Node (WDIO)</strong> — in <code>wdio.conf.js</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> config = {
  <span class="hljs-comment">// default timeout for all</span>
  <span class="hljs-comment">// waitFor* / auto-wait commands (ms)</span>
  <span class="hljs-attr">waitforTimeout</span>: <span class="hljs-number">10000</span>,
}
</code></pre>
</div>
</div>
<p><span class="small"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Implicit only waits for the element to <strong>exist</strong> (presence) — not visible, not enabled. A blunt safety net.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="explicit-waits--the-conditions-that-matter">Explicit waits — the conditions that matter</h2>
<div class="cols">
<div>
<p><strong>Python</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">wait = WebDriverWait(driver, <span class="hljs-number">15</span>)
wait.until(EC.presence_of_element_located(L))      <span class="hljs-comment"># in the DOM</span>
wait.until(EC.visibility_of_element_located(L))    <span class="hljs-comment"># visible</span>
wait.until(EC.element_to_be_clickable(L))          <span class="hljs-comment"># tappable</span>
</code></pre>
</div>
<div>
<p><strong>Node (WDIO)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// WebdriverIO auto-waits on every command…</span>
<span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~Login&#x27;</span>).<span class="hljs-title function_">click</span>()      <span class="hljs-comment">// waits to exist+interactable</span>
<span class="hljs-comment">// …and explicit when you need a condition:</span>
<span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~View All&#x27;</span>).<span class="hljs-title function_">waitForDisplayed</span>({ <span class="hljs-attr">timeout</span>: <span class="hljs-number">15000</span> })
</code></pre>
</div>
</div>
<br />
<p><span class="small"><strong>presence</strong> = exists · <strong>visibility</strong> = on screen · <strong>clickable</strong> = visible + enabled. Pick the weakest one that proves what you need.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="explicit-wait-conditions--the-toolbox">Explicit wait conditions — the toolbox</h2>
<div class="cols">
<div>
<p><strong>Python</strong> — <code>expected_conditions as EC</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text"># exists / visible
presence_of_element_located
visibility_of_element_located
presence_of_all_elements_located
visibility_of_all_elements_located
# interactable
element_to_be_clickable
# gone / changed
invisibility_of_element_located
staleness_of
# content / state
text_to_be_present_in_element
text_to_be_present_in_element_value
element_to_be_selected
</code></pre>
</div>
<div>
<p><strong>Node (WDIO)</strong> — <code>await $(el).waitFor*</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">waitForExist        # exists
waitForDisplayed    # visible       ← native <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/>
waitForEnabled      # not disabled  ← native <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/>
waitForStable       # done animating
waitForClickable    # BROWSER ONLY <img class="emoji" draggable="false" alt="⚠" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/>

browser.waitUntil(fn)   # ANY custom check
</code></pre>
<p>Options on every <code>waitFor*</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js">{ timeout, interval, reverse, timeoutMsg }
<span class="hljs-comment">// reverse: true → wait for the OPPOSITE</span>
<span class="hljs-comment">//   e.g. spinner to disappear</span>
</code></pre>
</div>
</div>
<p><span class="small">Each returns the element (or <code>true</code>) the <strong>instant</strong> it's satisfied. <img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> In a <strong>native</strong> app, <code>waitForClickable</code>/<code>isClickable</code> are browser-only — use <code>waitForDisplayed</code> + <code>waitForEnabled</code>. Wait for things to <strong>go away</strong> with <code>invisibility_of_*</code> / <code>reverse: true</code>.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="explicit-waits-in-action--%E2%9D%8C-vs-%E2%9C%85">Explicit waits in action — <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> vs <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></h2>
<p>Our demo app shows a <strong>splash</strong> before the login screen. <code>sleep</code> <em>guesses</em> the delay;<br />
an explicit wait <em>knows</em> the moment the field is ready.</p>
<div class="cols">
<div>
<p><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> <strong>Brittle</strong> — fixed guess</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">import</span> time
time.sleep(<span class="hljs-number">5</span>)                 <span class="hljs-comment"># hope splash is gone</span>
driver.find_element(*USERNAME) \
      .send_keys(USER)        <span class="hljs-comment"># flaky if slow,</span>
                              <span class="hljs-comment"># wasteful if fast</span>
</code></pre>
</div>
<div>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> <strong>Reliable</strong> — wait for the condition</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">wait = WebDriverWait(driver, <span class="hljs-number">15</span>)
user = wait.until(
    EC.element_to_be_clickable(USERNAME))
user.click()
user.send_keys(USER)          <span class="hljs-comment"># runs the instant</span>
                              <span class="hljs-comment"># the field is ready</span>
</code></pre>
</div>
</div>
<p><span class="small">Returns as soon as the condition is true — never the full 15s unless it has to. Same idea in WDIO: <code>await $(USERNAME).waitForEnabled()</code> then act.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="fluent-waits--explicit-fine-tuned">Fluent waits — explicit, fine-tuned</h2>
<p>A <strong>fluent wait</strong> is just an explicit wait with two knobs turned: a custom <strong>poll interval</strong><br />
and a list of <strong>transient exceptions to ignore</strong> while polling (e.g. a brief stale element<br />
as a screen re-renders).</p>
<div class="cols">
<div>
<p><strong>Python</strong> — <code>WebDriverWait</code> <em>is</em> the fluent wait</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> selenium.common.exceptions <span class="hljs-keyword">import</span> (
    StaleElementReferenceException)

wait = WebDriverWait(
    driver,
    timeout=<span class="hljs-number">20</span>,
    poll_frequency=<span class="hljs-number">0.5</span>,            <span class="hljs-comment"># check every 0.5s</span>
    ignored_exceptions=[           <span class="hljs-comment"># swallow these</span>
        StaleElementReferenceException],
)
wait.until(EC.element_to_be_clickable(LOGIN_BTN))
</code></pre>
</div>
<div>
<p><strong>Node (WDIO)</strong> — same knobs on any <code>waitFor*</code></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-keyword">await</span> $(<span class="hljs-variable constant_">LOGIN_BTN</span>).<span class="hljs-title function_">waitForEnabled</span>({
  <span class="hljs-attr">timeout</span>: <span class="hljs-number">20000</span>,
  <span class="hljs-attr">interval</span>: <span class="hljs-number">500</span>,                  <span class="hljs-comment">// poll every 0.5s</span>
  <span class="hljs-attr">timeoutMsg</span>: <span class="hljs-string">&#x27;Login never enabled&#x27;</span>,
})

<span class="hljs-comment">// or a custom condition:</span>
<span class="hljs-keyword">await</span> browser.<span class="hljs-title function_">waitUntil</span>(fn,
  { <span class="hljs-attr">timeout</span>: <span class="hljs-number">20000</span>, <span class="hljs-attr">interval</span>: <span class="hljs-number">500</span> })
</code></pre>
<p><span class="small">WDIO's retry already swallows transient &quot;not found&quot; errors for you.</span></p>
</div>
</div>
<p><span class="small">Reach for it when default polling is too chatty/coarse, or an element is briefly <strong>stale</strong> mid-transition. Otherwise plain explicit is enough — and it's still <strong>not</strong> <code>sleep</code>.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="dont-mix-implicit--explicit">Don't mix implicit + explicit</h2>
<ul>
<li>Setting <strong>both</strong> can make timeouts <strong>add up</strong> unpredictably (waits stack)</li>
<li>Pick a strategy:
<ul>
<li><strong>WebdriverIO</strong> → built-in <strong>auto-wait</strong>; add <code>waitForDisplayed</code> for assertions</li>
<li><strong>Python</strong> → set a small/no implicit wait, use <strong>explicit</strong> <code>WebDriverWait</code> everywhere</li>
</ul>
</li>
<li>Put the wait in a <strong>shared helper</strong> so every test is synced the same way</li>
</ul>
<blockquote>
<p>Synchronization is a property of your <strong>framework</strong>, not something you sprinkle per-test.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="when-to-use-which-wait">When to use which wait</h2>
<table>
<thead>
<tr>
<th>Wait</th>
<th>Reach for it when…</th>
<th>Watch out</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Implicit</strong></td>
<td>quick scripts/spikes; a <strong>small global floor</strong> so finds survive minor lag</td>
<td>too blunt for real flows — <strong>never</strong> stack it with explicit</td>
</tr>
<tr>
<td><strong>Explicit</strong> <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
<td><strong>almost always</strong> — waiting on a <strong>specific state</strong> (displayed, enabled, gone, text)</td>
<td><em>(this is the default — reach here first)</em></td>
</tr>
<tr>
<td><strong>Fluent</strong></td>
<td>explicit isn't enough: <strong>tune the poll interval</strong>, or <strong>ignore transient</strong> stale errors mid-animation</td>
<td>premature tuning — default polling usually works</td>
</tr>
</tbody>
</table>
<blockquote>
<p><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> <strong>Default to explicit.</strong> Optionally add a <em>small</em> implicit floor — but never stack both. Use <strong>fluent</strong> only when you need the extra knobs. And never <code>sleep</code>.</p>
</blockquote>
<p><span class="small">Put the chosen wait in a <strong>shared helper / base</strong> so the whole suite syncs the same way.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="%F0%9F%A7%AA-lab--implicit-vs-explicit-vs-fluent"><img class="emoji" draggable="false" alt="🧪" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ea.svg" data-marp-twemoji=""/> Lab — implicit vs explicit vs fluent</h2>
<p>Now <strong>feel</strong> the difference. Drive the Session 1 login flow <strong>three times</strong> on the demo app —<br />
its <strong>splash screen</strong> is the thing you wait on.</p>
<ul>
<li><strong><code>implicit</code></strong> — one global timeout; plain finds <strong>retry</strong> past the splash</li>
<li><strong><code>explicit</code></strong> — <code>WebDriverWait</code> / <code>waitForDisplayed</code> <strong>per step</strong></li>
<li><strong><code>fluent</code></strong> — explicit + a custom <strong>poll interval</strong> / <strong>ignored exceptions</strong></li>
</ul>
<br />
<blockquote>
<p><strong>Try it:</strong> drop the implicit timeout to <strong>1s</strong> and watch it fail — that's why explicit wins.</p>
</blockquote>

</code></pre>

<h2 id="%F0%9F%93%90-screen-coordinates--how-a-tap-is-placed"><img class="emoji" draggable="false" alt="📐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4d0.svg" data-marp-twemoji=""/> Screen coordinates — how a tap is placed</h2>
<p>Every gesture resolves to an <strong>(x, y) in pixels</strong> — origin <strong><code>(0,0)</code> = top-left</strong>, <strong>x → right</strong>, <strong>y ↓ down</strong>, bottom-right = <strong><code>(w, h)</code></strong>.</p>
<div class="cols">
<div>
<p><img src="images/screen-coordinates.png" alt="" style="height:340px;" /></p>
</div>
<div>
<p><strong>Get the size → compute points</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Python</span>
s = driver.get_window_size()   <span class="hljs-comment"># {&#x27;width&#x27;:1080,&#x27;height&#x27;:2400}</span>
cx, cy = s[<span class="hljs-string">&#x27;width&#x27;</span>]//<span class="hljs-number">2</span>, s[<span class="hljs-string">&#x27;height&#x27;</span>]//<span class="hljs-number">2</span>          <span class="hljs-comment"># (540, 1200)</span>
<span class="hljs-comment"># swipe UP = bottom → top, same x:</span>
start = (cx, <span class="hljs-built_in">int</span>(s[<span class="hljs-string">&#x27;height&#x27;</span>]*<span class="hljs-number">0.8</span>))              <span class="hljs-comment"># (540, 1920)</span>
end   = (cx, <span class="hljs-built_in">int</span>(s[<span class="hljs-string">&#x27;height&#x27;</span>]*<span class="hljs-number">0.2</span>))              <span class="hljs-comment"># (540, 480)</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// WDIO</span>
<span class="hljs-keyword">const</span> { width, height } = <span class="hljs-keyword">await</span> driver.<span class="hljs-title function_">getWindowSize</span>()
<span class="hljs-keyword">const</span> cx = <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">round</span>(width / <span class="hljs-number">2</span>)
<span class="hljs-keyword">const</span> start = { <span class="hljs-attr">x</span>: cx, <span class="hljs-attr">y</span>: <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">round</span>(height * <span class="hljs-number">0.8</span>) }  <span class="hljs-comment">// (540, 1920)</span>
<span class="hljs-keyword">const</span> end   = { <span class="hljs-attr">x</span>: cx, <span class="hljs-attr">y</span>: <span class="hljs-title class_">Math</span>.<span class="hljs-title function_">round</span>(height * <span class="hljs-number">0.2</span>) }  <span class="hljs-comment">// (540, 480)</span>
</code></pre>
</div>
</div>
<p><span class="small"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> Sizes differ per device — <strong>compute from width/height (or %)</strong>, never hard-code pixels.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>

<h2 id="two-ways-to-gesture">Two ways to gesture</h2>
<div class="cols">
<div>
<p><strong>1. <code>mobile:</code> driver commands</strong> <img class="emoji" draggable="false" alt="🥇" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f947.svg" data-marp-twemoji=""/><br />
High-level, reliable, per-platform.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-keyword">await</span> driver.<span class="hljs-title function_">execute</span>(<span class="hljs-string">&#x27;mobile: scrollGesture&#x27;</span>, {
  <span class="hljs-attr">left</span>: <span class="hljs-number">100</span>, <span class="hljs-attr">top</span>: <span class="hljs-number">400</span>, <span class="hljs-attr">width</span>: <span class="hljs-number">200</span>, <span class="hljs-attr">height</span>: <span class="hljs-number">800</span>,
  <span class="hljs-attr">direction</span>: <span class="hljs-string">&#x27;down&#x27;</span>, <span class="hljs-attr">percent</span>: <span class="hljs-number">1.0</span>
})
</code></pre>
</div>
<div>
<p><strong>2. W3C Actions</strong><br />
Low-level pointer API, cross-platform, more verbose.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> selenium.webdriver.common.actions \
  <span class="hljs-keyword">import</span> interaction
<span class="hljs-comment"># build pointer down → move → up</span>
</code></pre>
</div>
</div>
<br />
<p><span class="small">Prefer <strong><code>mobile:</code></strong> commands (<code>scrollGesture</code>, <code>swipeGesture</code>, <code>longClickGesture</code> on Android; <code>mobile: scroll</code> / <code>mobile: swipe</code> on iOS) — they're simpler and far less flaky than hand-rolled Actions.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="scroll--up--down">Scroll — up &amp; down</h2>
<p>Flick the list to bring an off-screen widget into view (here: the <strong>right-edge band</strong>).</p>
<div class="cols">
<div>
<p><img src="images/gesture-scroll.png" alt="" style="height:360px;" /></p>
</div>
<div>
<p><strong>Node</strong> — scroll until visible</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;android=new UiScrollable(&#x27;</span> +
  <span class="hljs-string">&#x27;new UiSelector().scrollable(true))&#x27;</span> +
  <span class="hljs-string">&#x27;.scrollIntoView(new UiSelector()&#x27;</span> +
  <span class="hljs-string">&#x27;.descriptionContains(&quot;Pinch to Zoom&quot;))&#x27;</span>)
</code></pre>
<p><strong>Python</strong> — flick up by coordinates</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">driver.execute_script(<span class="hljs-string">&#x27;mobile: scrollGesture&#x27;</span>,
  {**band, <span class="hljs-string">&#x27;direction&#x27;</span>: <span class="hljs-string">&#x27;up&#x27;</span>, <span class="hljs-string">&#x27;percent&#x27;</span>: <span class="hljs-number">1.0</span>})
</code></pre>
</div>
</div>
<p><span class="small"><code>scrollIntoView</code> scrolls <strong>forward</strong>; <code>mobile: scrollGesture</code> flicks <strong>up</strong> — <code>band</code> from <code>getWindowSize</code>.</span></p>

    <span class="hljs-keyword">await</span> $(<span class="hljs-variable constant_">PASSWORD</span>).<span class="hljs-title function_">setValue</span>(pwd)

<p><strong>External data</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// data/users.json → import &amp; loop</span>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Python</span>

<h2 id="why-parallel">Why parallel</h2>
<ul>
<li>A suite of <strong>X test cases</strong> run sequentially = <strong>X × per-test time</strong> — split across devices to <strong>cut total time</strong></li>
<li>Each test is <strong>independent</strong> (fresh login, own data row) → safe to run <strong>at the same time</strong></li>
<li>Parallelism needs <strong>more devices</strong>: one session per emulator/simulator</li>
<li>Same idea scales later to <strong>cloud device farms</strong> (Session 3)</li>
</ul>
<br />
<blockquote>
<p>Rule of thumb: tests must be <strong>isolated</strong> — no shared state, no fixed order — <em>before</em> you parallelize.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>

<h2 id="two-ways-to-go-parallel">Two ways to go parallel</h2>
<div class="cols">
<div>
<p><strong><img class="emoji" draggable="false" alt="✂️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2702.svg" data-marp-twemoji=""/> Shard — split for speed</strong><br />
Divide the suite; each test runs <strong>once</strong>, on one device.</p>
<ul>
<li>N tests across D devices → ~<strong>N ÷ D</strong> wall-clock</li>
<li><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> goal: <strong>finish faster</strong></li>
<li><img class="emoji" draggable="false" alt="🧪" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ea.svg" data-marp-twemoji=""/> <strong>this lab</strong>: device A runs 2 rows, device B runs the other 2</li>
</ul>
</div>
<div>
<p><strong><img class="emoji" draggable="false" alt="🔲" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f532.svg" data-marp-twemoji=""/> Matrix — same suite on every device</strong><br />
Run the <strong>whole</strong> suite on <strong>each</strong> device.</p>
<ul>
<li>N tests × D devices → more runs, <strong>not</strong> faster</li>
<li><img class="emoji" draggable="false" alt="🎯" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f3af.svg" data-marp-twemoji=""/> goal: <strong>does it work everywhere?</strong></li>
<li>e.g. phone vs tablet · Android 14 vs 12 · iOS vs Android</li>
</ul>
</div>
</div>
<br />
<blockquote>
<p>Same machinery (a session per device + isolation) — only <strong>who runs what</strong> differs. <strong>This lab shards</strong> because the goal is cutting execution time; swap to a matrix when you care about <strong>device coverage</strong>.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="how-appium-supports-parallel-testing">How Appium supports parallel testing</h2>
<p>Appium is a <strong>WebDriver server</strong> — each test opens its own <strong>session</strong>. A server <em>can</em> hold many sessions, but for parallel runs the safer default is <strong>one server per device</strong>.</p>
<div class="cols">
<div>
<p><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Recommended: one server per device</strong><br />
Run an <code>appium</code> process per device on its own port (<code>-p 4723</code>, <code>-p 4724</code>, …) because:</p>
<ul>
<li><img class="emoji" draggable="false" alt="🛡️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6e1.svg" data-marp-twemoji=""/> <strong>fault isolation</strong> — one server crashing/hanging never takes the others down</li>
<li><img class="emoji" draggable="false" alt="🧵" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9f5.svg" data-marp-twemoji=""/> <strong>no contention</strong> — sessions don't share one Node process / event loop</li>
<li><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <strong>clean logs</strong> — one log stream per device</li>
<li><img class="emoji" draggable="false" alt="☁️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2601.svg" data-marp-twemoji=""/> mirrors how <strong>cloud grids</strong> scale (Session 3)</li>
</ul>
</div>
<div>
<p><strong>Each session also needs isolation</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="🖥️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5a5.svg" data-marp-twemoji=""/> its <strong>own server</strong> → <code>--port</code></li>
<li><img class="emoji" draggable="false" alt="🆔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f194.svg" data-marp-twemoji=""/> a <strong>distinct device</strong> → <code>appium:udid</code></li>
<li><img class="emoji" draggable="false" alt="🔌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f50c.svg" data-marp-twemoji=""/> its <strong>own driver ports</strong> so they don't collide:
<ul>
<li>Android (UiAutomator2) → <code>systemPort</code></li>
<li>iOS (XCUITest) → <code>wdaLocalPort</code></li>
</ul>
</li>
</ul>
</div>
</div>
<p><span class="small">A single server holding many sessions is fine for a quick local run, but one wedged session can stall the whole process — so per-device servers are the default. Your runner (WDIO <code>maxInstances</code>, pytest-xdist <code>-n</code>) launches the sessions; you point each at its server.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="starting-appium-servers-for-parallel-runs">Starting Appium servers for parallel runs</h2>
<p><strong>One server per device</strong> — launch each on its own <strong>port</strong> (and its own log), then point each test session at the matching server.</p>
<div class="cols">
<div>
<p><strong>Spin up two servers</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Terminal A — first emulator</span>
appium -p 4723 \
  --<span class="hljs-built_in">log</span> appium-5554.log

<span class="hljs-comment"># Terminal B — second emulator</span>
appium -p 4724 \
  --<span class="hljs-built_in">log</span> appium-5556.log
</code></pre>
</div>
<div>
<p><strong>Handy server args</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">-p,  --port           listen port (unique!)
-a,  --address        bind address
-pa, --base-path      URL base path
-g,  --log            per-server log file
     --relaxed-security  enable risky features
-dc, --default-capabilities  bake in caps (JSON)
</code></pre>
</div>
</div>
<p><span class="small"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> <strong>Server port</strong> (<code>-p</code>) ≠ <strong>driver port</strong> — <code>systemPort</code> / <code>wdaLocalPort</code> are per-session <strong>capabilities</strong>, not server args. Give each parallel session <strong>its own server (<code>-p</code>) <em>and</em> its own driver ports</strong>.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 2</header>
<h2 id="per-platform-isolation--android-vs-ios">Per-platform isolation — Android vs iOS</h2>
<p>The <strong>server</strong> start command is the same on both platforms (<code>appium -p &lt;port&gt;</code>). What differs is the <strong>per-session capabilities</strong> each driver needs so parallel sessions don't fight over device-side ports.</p>
<div class="cols">
<div>
<p><strong><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android — UiAutomator2</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js">{
  <span class="hljs-string">&#x27;appium:udid&#x27;</span>: <span class="hljs-string">&#x27;emulator-5554&#x27;</span>,
  <span class="hljs-string">&#x27;appium:systemPort&#x27;</span>: <span class="hljs-number">8200</span>,        <span class="hljs-comment">// ADB bridge</span>
  <span class="hljs-string">&#x27;appium:chromedriverPort&#x27;</span>: <span class="hljs-number">9515</span>,  <span class="hljs-comment">// WebView</span>
  <span class="hljs-string">&#x27;appium:mjpegServerPort&#x27;</span>: <span class="hljs-number">7810</span>,   <span class="hljs-comment">// screen stream</span>
}
</code></pre>
</div>
<div>
<p><strong><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS — XCUITest</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js">{
  <span class="hljs-string">&#x27;appium:udid&#x27;</span>: <span class="hljs-string">&#x27;&lt;simulator-UDID&gt;&#x27;</span>,
  <span class="hljs-string">&#x27;appium:wdaLocalPort&#x27;</span>: <span class="hljs-number">8100</span>,      <span class="hljs-comment">// WebDriverAgent</span>
  <span class="hljs-string">&#x27;appium:derivedDataPath&#x27;</span>: <span class="hljs-string">&#x27;/tmp/wda-0&#x27;</span>, <span class="hljs-comment">// own Xcode build</span>
  <span class="hljs-string">&#x27;appium:mjpegServerPort&#x27;</span>: <span class="hljs-number">7810</span>,   <span class="hljs-comment">// screen stream</span>
}
</code></pre>
</div>
</div>
<p><span class="small"><img class="emoji" draggable="false" alt="🔑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f511.svg" data-marp-twemoji=""/> Offset <strong>every port by the worker index</strong> (<code>8200 + i</code>, <code>8100 + i</code>, …) so worker 0/1/2 never collide. iOS also needs a <strong>separate <code>derivedDataPath</code></strong> per simulator — parallel WebDriverAgent builds sharing one DerivedData dir corrupt each other. (This is exactly what <code>taqwright</code> does per worker.)</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="what-each-argument-does">What each argument does</h2>
<table>
<thead>
<tr>
<th>Arg / capability</th>
<th>Platform</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>-p</code> / <code>--port</code> <em>(server)</em></td>
<td>both</td>
<td>Port the <strong>Appium REST API</strong> listens on — one per server</td>
</tr>
<tr>
<td><code>appium:udid</code></td>
<td>both</td>
<td>Pins the session to a <strong>specific device</strong> — emulator serial / simulator UDID</td>
</tr>
<tr>
<td><code>appium:systemPort</code></td>
<td><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android</td>
<td>UiAutomator2 <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> <strong>ADB bridge</strong> port — <strong>required</strong>, must be unique</td>
</tr>
<tr>
<td><code>appium:chromedriverPort</code></td>
<td><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android</td>
<td>Port for <strong>ChromeDriver</strong> — only when automating <strong>WebViews / hybrid</strong> apps</td>
</tr>
<tr>
<td><code>appium:wdaLocalPort</code></td>
<td><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS</td>
<td>Local port to the <strong>WebDriverAgent</strong> server on the sim — <strong>required</strong>, unique</td>
</tr>
<tr>
<td><code>appium:derivedDataPath</code></td>
<td><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS</td>
<td>Own <strong>Xcode DerivedData</strong> dir per sim — stops parallel WDA builds corrupting each other</td>
</tr>
<tr>
<td><code>appium:mjpegServerPort</code></td>
<td>both</td>
<td>Port for the <strong>MJPEG screen stream</strong> — only if you stream screenshots/video</td>
</tr>
</tbody>
</table>
<p><span class="small"><strong>Required for parallel:</strong> unique <code>--port</code> per server · <code>udid</code> · <code>systemPort</code> (Android) / <code>wdaLocalPort</code> + <code>derivedDataPath</code> (iOS). The rest are feature-dependent.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="parallel--node-webdriverio">Parallel — Node (WebdriverIO)</h2>
<p>Set <strong><code>maxInstances</code></strong> and give each capability its <strong>own server (<code>port</code>) + device + ports + specs</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// wdio.conf.js — WDIO reads `port`/`hostname` per capability</span>
<span class="hljs-keyword">export</span> <span class="hljs-keyword">const</span> config = {
  <span class="hljs-attr">maxInstances</span>: <span class="hljs-number">2</span>,                 <span class="hljs-comment">// up to 2 sessions at once</span>
  <span class="hljs-attr">capabilities</span>: [
    { <span class="hljs-attr">port</span>: <span class="hljs-number">4723</span>,                                  <span class="hljs-comment">// device A&#x27;s own Appium server</span>
      <span class="hljs-attr">platformName</span>: <span class="hljs-string">&#x27;Android&#x27;</span>, <span class="hljs-string">&#x27;appium:automationName&#x27;</span>: <span class="hljs-string">&#x27;UiAutomator2&#x27;</span>,
      <span class="hljs-string">&#x27;appium:udid&#x27;</span>: <span class="hljs-string">&#x27;emulator-5554&#x27;</span>, <span class="hljs-string">&#x27;appium:systemPort&#x27;</span>: <span class="hljs-number">8200</span>,
      <span class="hljs-attr">specs</span>: [<span class="hljs-string">&#x27;./test/specs/group-a.e2e.js&#x27;</span>] },
    { <span class="hljs-attr">port</span>: <span class="hljs-number">4724</span>,                                  <span class="hljs-comment">// device B&#x27;s own Appium server</span>
      <span class="hljs-attr">platformName</span>: <span class="hljs-string">&#x27;Android&#x27;</span>, <span class="hljs-string">&#x27;appium:automationName&#x27;</span>: <span class="hljs-string">&#x27;UiAutomator2&#x27;</span>,
      <span class="hljs-string">&#x27;appium:udid&#x27;</span>: <span class="hljs-string">&#x27;emulator-5556&#x27;</span>, <span class="hljs-string">&#x27;appium:systemPort&#x27;</span>: <span class="hljs-number">8201</span>,

<h2 id="parallel--python-pytest">Parallel — Python (pytest)</h2>
<p>The <strong><code>pytest-xdist</code></strong> plugin splits your tests across <strong><code>-n</code> workers</strong>; a fixture keyed on <code>worker_id</code> hands each worker its own device.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># conftest.py — each worker → its own device AND its own Appium server</span>
DEVICES = [{<span class="hljs-string">&quot;udid&quot;</span>: <span class="hljs-string">&quot;emulator-5554&quot;</span>, <span class="hljs-string">&quot;systemPort&quot;</span>: <span class="hljs-number">8200</span>, <span class="hljs-string">&quot;appium_port&quot;</span>: <span class="hljs-number">4723</span>},
           {<span class="hljs-string">&quot;udid&quot;</span>: <span class="hljs-string">&quot;emulator-5556&quot;</span>, <span class="hljs-string">&quot;systemPort&quot;</span>: <span class="hljs-number">8201</span>, <span class="hljs-string">&quot;appium_port&quot;</span>: <span class="hljs-number">4724</span>}]

<span class="hljs-meta">@pytest.fixture</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">driver</span>(<span class="hljs-params">request</span>):
    wid = <span class="hljs-built_in">getattr</span>(request.config, <span class="hljs-string">&quot;workerinput&quot;</span>, {}).get(<span class="hljs-string">&quot;workerid&quot;</span>, <span class="hljs-string">&quot;gw0&quot;</span>)
    dev = DEVICES[<span class="hljs-built_in">int</span>(wid[<span class="hljs-number">2</span>:] <span class="hljs-keyword">or</span> <span class="hljs-number">0</span>) % <span class="hljs-built_in">len</span>(DEVICES)]   <span class="hljs-comment"># gw0→0, gw1→1</span>
    url = <span class="hljs-string">f&quot;http://127.0.0.1:<span class="hljs-subst">{dev[<span class="hljs-string">&#x27;appium_port&#x27;</span>]}</span>&quot;</span>    <span class="hljs-comment"># this worker&#x27;s own server</span>
    caps = {**CAPABILITIES, <span class="hljs-string">&quot;appium:udid&quot;</span>: dev[<span class="hljs-string">&quot;udid&quot;</span>],
            <span class="hljs-string">&quot;appium:systemPort&quot;</span>: dev[<span class="hljs-string">&quot;systemPort&quot;</span>]}
    ...   <span class="hljs-comment"># webdriver.Remote(url, options=...)</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">pytest -n 2 -v             <span class="hljs-comment"># 2 workers → 2 devices, side by side</span>
</code></pre>
<p><span class="small">xdist <strong>auto-distributes</strong> the rows across workers; the fixture gives each its own emulator + <code>systemPort</code> + <strong>Appium server</strong> so sessions never clash.</span></p>

<h2 id="make-parallel-safe">Make parallel safe</h2>
<ul>
<li><img class="emoji" draggable="false" alt="🧍" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9cd.svg" data-marp-twemoji=""/> <strong>One session per device</strong> — N parallel tests need N emulators/simulators</li>
<li><img class="emoji" draggable="false" alt="🔌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f50c.svg" data-marp-twemoji=""/> <strong>Unique ports</strong> — <code>systemPort</code> (Android) / <code>wdaLocalPort</code> (iOS) per session</li>
<li><img class="emoji" draggable="false" alt="🧪" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ea.svg" data-marp-twemoji=""/> <strong>No shared state</strong> — each test logs in fresh; never depend on run order</li>
<li><img class="emoji" draggable="false" alt="🆔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f194.svg" data-marp-twemoji=""/> <strong>Independent data</strong> — don't let two rows fight over the same account/cart</li>
<li><img class="emoji" draggable="false" alt="📊" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4ca.svg" data-marp-twemoji=""/> <strong>Per-test artifacts</strong> — name screenshots/logs by device so reports stay readable</li>
</ul>
<blockquote>
<p>Start with <strong>2 devices</strong> locally; scale to a <strong>cloud grid</strong> in Session 3.</p>
</blockquote>

<p>Take the data-driven login rows and run them across <strong>two emulators at once</strong> — the same isolated cases, finished in <strong>~half the time</strong>.</p>
<ul>
<li><img class="emoji" draggable="false" alt="🅰️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f170.svg" data-marp-twemoji=""/> <strong>device A</strong> → <code>emulator-5554</code> · <code>systemPort 8200</code> · Appium <strong>:4723</strong></li>

<h2 id="a-maintainable-project-layout">A maintainable project layout</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>suite/
├── data/             # test data — credentials.json, products.json
├── test/specs/       # the tests — thin, readable, data-driven
├── test/             # shared helpers — login flow, waits, loaders
├── config/           # wdio.conf.js / conftest.py — caps, hooks, waits, devices
└── reports/          # (Session 3) screenshots, html reports
</code></pre>
<ul>
<li><strong>Hooks / fixtures</strong> spin up &amp; tear down the driver once per test</li>
<li><strong>Config</strong> holds capabilities + the wait strategy + parallel devices — never hard-coded in tests</li>
<li>Tests call <strong>shared helpers</strong>, run over <strong>data rows</strong>, make <strong>assertions</strong>. That's it.</li>
</ul>

<h2 id="pitfalls-to-avoid">Pitfalls to avoid</h2>
<ul>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong><code>sleep()</code></strong> anywhere — wait for a condition</li>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong>Mixing implicit + explicit</strong> waits — pick one strategy</li>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong>Locators copy-pasted across tests</strong> — keep them in one shared place</li>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong>Sharing state across data rows</strong> — each case starts clean (fresh login / restart)</li>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong>Hand-rolled Actions</strong> when a <code>mobile:</code> gesture command exists</li>
<li><img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> <strong>Parallel without isolation</strong> — unique ports/devices per session, no shared state</li>
</ul>
