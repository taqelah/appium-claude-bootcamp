<h2 id="%F0%9F%93%A6-android-builds-apk-vs-aab"><img class="emoji" draggable="false" alt="📦" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4e6.svg" data-marp-twemoji=""/> Android builds: APK vs AAB</h2>
<ul>
<li><strong>APK</strong> = <em>Android Package</em> — the <strong>installable</strong> app file. Devices run this; <code>adb install app.apk</code>.</li>
<li><strong>AAB</strong> = <em>Android App Bundle</em> — a <strong>publishing</strong> format you upload to Google Play.</li>
</ul>
<table>
<thead>
<tr>
<th></th>
<th><strong>APK</strong></th>
<th><strong>AAB</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td>Installs on a device?</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> directly</td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Play repackages it first</td>
</tr>
<tr>
<td>Purpose</td>
<td>Run / test the app</td>
<td>Ship to the store</td>
</tr>
<tr>
<td>Size on device</td>
<td>One-size-fits-all</td>
<td>Play delivers a slimmer, device-specific APK</td>
</tr>
</tbody>
</table>
<blockquote>
<p><strong>For Appium we use the <code>.apk</code>.</strong> (An AAB can be converted with <code>bundletool</code>.)</p>
</blockquote>

<h2 id="%F0%9F%9B%A0%EF%B8%8F-android-engines-uiautomator2-vs-espresso"><img class="emoji" draggable="false" alt="🛠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6e0.svg" data-marp-twemoji=""/> Android engines: UiAutomator2 vs Espresso</h2>
<table>
<thead>
<tr>
<th></th>
<th><strong>UiAutomator2</strong></th>
<th><strong>Espresso</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td>Style</td>
<td><strong>Black-box</strong> — drives device from outside</td>
<td><strong>White-box</strong> — runs <em>inside</em> the app</td>
</tr>
<tr>
<td>Scope</td>
<td><strong>Any app + the OS</strong> (settings, notifications)</td>
<td><strong>Your own app only</strong></td>
</tr>
<tr>
<td>Source needed?</td>
<td>No</td>
<td>Yes (wired into the app build)</td>
</tr>
<tr>
<td>Speed</td>
<td>Flexible, slightly slower</td>
<td>Faster, auto-syncs with UI thread</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>UiAutomator2</strong> → Appium's <strong>default</strong>; black-box testing the shipped app <em>(what we use)</em>.</li>
<li><strong>Espresso</strong> → devs testing <em>their own</em> app in-codebase with tight timing sync.</li>
</ul>

<li><strong>.app</strong> = application <strong>bundle</strong> — the raw build Xcode produces.</li>
<li><strong>.ipa</strong> = <em>iOS App Store Package</em> — a <strong>zipped, signed</strong> <code>.app</code> for real devices.</li>
</ul>
<table>
<thead>
<tr>
<th></th>
<th><strong>.app</strong></th>
<th><strong>.ipa</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td>Runs on</td>
<td><strong>Simulator</strong> (no signing)</td>
<td><strong>Real device</strong> (needs code signing)</td>
</tr>
<tr>
<td>Form</td>
<td>A folder/bundle</td>
<td>A zip wrapping the <code>.app</code></td>
</tr>
<tr>
<td>Use in Appium</td>
<td>Simulator testing</td>
<td>Physical iPhone/iPad</td>
</tr>
</tbody>
</table>
<blockquote>
<p>An <code>.ipa</code> is basically a signed, zipped <code>.app</code> ready for real devices &amp; distribution.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="%F0%9F%93%8B-listing-devices--their-status"><img class="emoji" draggable="false" alt="📋" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4cb.svg" data-marp-twemoji=""/> Listing devices &amp; their status</h2>
<p><code>adb devices</code> only shows <strong>running</strong> emulators (and <code>offline</code> while booting). To see <strong>every AVD</strong> with a shutdown/running state:</p>
<div class="cols">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># all defined AVDs (any state)</span>
emulator -list-avds
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># running emulators only</span>
adb devices
</code></pre>
</div>
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">Android (adb + emulator):
  Pixel_10_Pro_XL      (shutdown)
  Pixel_10_Pro_XL_2    (shutdown)
  Pixel_10_Pro_XL_3    (shutdown)
  taqwright_api34      (shutdown)
</code></pre>
<p><span class="small">Boot one → <code>emulator -avd Pixel_10_Pro_XL</code> → it appears in <code>adb devices</code>.</span></p>
</div>
</div>
<blockquote>
<p>The friendly <strong><code>avd:</code> + (status)</strong> listing is what <strong>mobile-mcp / taqwright</strong> prints via <code>mobile_list_available_devices</code>.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>

<h2 id="%E2%AC%87%EF%B8%8F-installing-the-app"><img class="emoji" draggable="false" alt="⬇️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2b07.svg" data-marp-twemoji=""/> Installing the app</h2>
<div class="cols">
<div>
<h3 id="%F0%9F%A4%96-android--apk-on-emulator"><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android — APK on emulator</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># states: device / offline / unauthorized</span>
adb devices

<span class="hljs-comment"># install / reinstall</span>
adb install -r app.apk
adb -s emulator-5554 install -r app.apk
</code></pre>
<p><span class="small">AAB? convert with <code>bundletool</code> first.</span></p>
</div>
<div>
<h3 id="%F0%9F%8D%8E-ios--app-on-simulator"><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS — .app on simulator</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># states: Booted / Shutdown</span>
xcrun simctl list devices
xcrun simctl boot <span class="hljs-string">&quot;iPhone 15&quot;</span>
open -a Simulator

<span class="hljs-comment"># install + launch</span>
xcrun simctl install booted MyApp.app
xcrun simctl launch booted com.example.MyApp
</code></pre>
<p><span class="small">Real device → install signed <code>.ipa</code>.</span></p>
</div>
</div>
<blockquote>
<p><strong>Rule:</strong> <code>.apk</code> → <code>adb install</code> · <code>.app</code> → <code>simctl install</code> · <code>.ipa</code> → real device (signed).</p>
</blockquote>

<h2 id="why-the-platform-differences-matter-to-testers">Why the platform differences matter to <em>testers</em></h2>
<ul>
<li><strong>iOS needs a Mac.</strong> Simulators + Xcode are macOS-only. Android works anywhere.</li>
<li><strong>iOS signing</strong> is a real hurdle (certs, provisioning). Android &quot;just installs.&quot;</li>
<li><strong>Different element trees &amp; attributes</strong> → same app, different locators per platform.</li>
<li>So in this course: <strong>Android is the required path</strong>; iOS is an <em>optional, macOS-only</em> track.</li>
</ul>
<footer>Taqelah Bootcamp · June 2026</footer>

<h2 id="real-device-vs-emulator--simulator">Real device vs emulator / simulator</h2>

<tr>
<th></th>
<th>Emulator / Simulator</th>

<td>Pre-release, perf, weird bugs</td>
</tr>

<h2 id="three-kinds-of-mobile-app">Three kinds of mobile app</h2>
<div class="cols">
<div>
<h3 id="native">Native</h3>
<p>Built with the platform SDK.<br />
Renders <strong>real OS widgets</strong>.</p>
</div>
<div>
<h3 id="hybrid">Hybrid</h3>
<p>Native shell <strong>+ a web view</strong><br />
(HTML/JS inside the app).</p>
</div>
<div>
<h3 id="web-mobile-web">Web (mobile web)</h3>
<p>Just a <strong>website</strong> in the<br />
phone's browser.</p>
</div>
</div>
<br />
<p>This distinction decides <strong>how you automate it</strong> — so let's make it concrete.</p>

<h2 id="native-vs-hybrid-vs-web--how-you-automate-each">Native vs Hybrid vs Web — how you automate each</h2>
<table>
<thead>
<tr>
<th></th>
<th>Native</th>
<th>Hybrid</th>
<th>Mobile Web</th>
</tr>
</thead>
<tbody>
<tr>
<td>Made of</td>
<td>OS UI widgets</td>
<td>Native + WebView</td>
<td>HTML in browser</td>
</tr>
<tr>
<td>You inspect</td>

</tr>
<tr>

<td>CSS/DOM <em>inside</em> webview</td>
<td>CSS / DOM</td>
</tr>
<tr>
<td>Appium handles it</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> natively</td>

<h2 id="what-is-appium">What is Appium?</h2>
<blockquote>
<p><strong>Appium is WebDriver for mobile.</strong></p>
</blockquote>
<ul>
<li>An <strong>open-source server</strong> that automates native, hybrid &amp; web apps</li>
<li>Speaks the <strong>W3C WebDriver protocol</strong> — the same standard Selenium uses</li>
<li><strong>Cross-platform:</strong> one API → Android <em>and</em> iOS</li>
<li><strong>Any language:</strong> Java, Python, JS, Ruby, C#… (it's just HTTP)</li>
<li><strong>No app changes required</strong> — you automate the real, shipped app</li>
</ul>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="%F0%9F%8C%90-what-is-w3c-webdriver"><img class="emoji" draggable="false" alt="🌐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f310.svg" data-marp-twemoji=""/> What is &quot;W3C WebDriver&quot;?</h2>
<ul>
<li><strong>W3C</strong> = <em>World Wide Web Consortium</em> — the body that sets web standards (HTML, CSS, web APIs).</li>
<li><strong>WebDriver</strong> = a <strong>W3C standard</strong> for remotely controlling a browser/app over <strong>HTTP + JSON</strong>.
<ul>
<li>Defines commands like <code>findElement</code>, <code>click</code>, <code>sendKeys</code>, <code>navigate</code>…</li>
<li>Vendor-neutral, so <em>any</em> client can talk to <em>any</em> compliant server.</li>
</ul>
</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>your test ──W3C WebDriver (HTTP + JSON)──► Appium server ──► device
</code></pre>
<ul>
<li><strong>Selenium</strong> uses it to drive <strong>browsers</strong> · <strong>Appium</strong> uses the <em>same</em> protocol to drive <strong>mobile apps</strong>.</li>
</ul>
<blockquote>
<p>Because the protocol is a shared standard, the commands look the same across languages and platforms.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="%F0%9F%93%9C-a-short-history-of-appium"><img class="emoji" draggable="false" alt="📜" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4dc.svg" data-marp-twemoji=""/> A short history of Appium</h2>

<thead>

<th>When</th>

<tbody>

<tr>
<td><strong>2012</strong></td>
<td>Builds <em>iOSAuto</em> on Apple's UIAutomation; <strong>Dan presents it as a lightning talk at SeleniumConf 2012 (London)</strong>, demoing Selenium-style iOS tests to Jason Huggins. Source goes on GitHub; HTTP server + WebDriver protocol added</td>
</tr>
<tr>
<td><strong>Nov 2012</strong></td>
<td>Renamed <strong>&quot;Appium&quot;</strong> at the Mobile Testing Summit</td>
</tr>
<tr>
<td><strong>2013</strong></td>
<td>Sauce Labs backs it; <strong>rebuilt on Node.js</strong> (Jonathan Lipps). Android + Selendroid support → <em>first truly cross-platform</em> framework</td>
</tr>
<tr>
<td><strong>May 2014</strong></td>
<td><strong>Appium 1.0</strong> — becomes the most popular OSS mobile automation framework</td>
</tr>
<tr>
<td><strong>2016</strong></td>
<td>Donated to the <strong>JS Foundation</strong> for long-term OSS stewardship</td>

<h2 id="the-one-idea-that-makes-appium-click">The one idea that makes Appium &quot;click&quot;</h2>
<p>You don't talk to the phone.<br />
You send <strong>HTTP requests</strong> to a <strong>server</strong>, and the server talks to the phone.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  your test code  ──HTTP──►  Appium server  ──►  driver  ──►  device
   (any language)            (port 4723)       (per-platform)
</code></pre>
<p>Your test is just a <strong>client</strong>. Swap the language, swap the device — the protocol stays the same.</p>
<footer>Taqelah Bootcamp · June 2026</footer>

<span class="hljs-punctuation">}</span>

<h2 id="why-appium-vs-the-alternatives">Why Appium (vs the alternatives)?</h2>
<table>
<thead>
<tr>
<th>Tool</th>
<th>Scope</th>
<th>Trade-off</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Appium</strong></td>
<td>iOS + Android, any language, native/hybrid/web</td>
<td>One API for everything <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
<tr>
<td>Espresso / XCUITest</td>
<td>One platform each (native)</td>
<td>Fast, but platform-locked + in-app</td>
</tr>
<tr>
<td>Detox</td>
<td>RN, gray-box</td>
<td>Great for RN only</td>
</tr>
<tr>
<td>Maestro</td>
<td>iOS + Android, YAML</td>
<td>Simple, but less programmable</td>
</tr>
</tbody>
</table>
<p>We pick Appium because it's the <strong>industry-standard, cross-platform, language-agnostic</strong> baseline —<br />
and what Claude tooling builds on.</p>

<header>AI-Assisted Mobile UI Test Automation · Session 1</header>
<h2 id="appium-capabilities--the-major-ones">Appium capabilities — the major ones</h2>
<table>
<thead>
<tr>
<th>Capability</th>
<th>Scope</th>
<th>What it does</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>platformName</code></td>
<td>both</td>
<td>OS family — <code>Android</code> / <code>iOS</code> <em>(W3C standard — no prefix)</em></td>
</tr>
<tr>
<td><code>appium:automationName</code></td>
<td>both</td>
<td>the <strong>driver</strong>: <code>UiAutomator2</code> (<img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/>) / <code>XCUITest</code> (<img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/>)</td>
</tr>
<tr>
<td><code>appium:deviceName</code></td>
<td>both</td>
<td>device label, e.g. <code>Pixel_10_Pro_XL</code></td>
</tr>
<tr>
<td><code>appium:udid</code></td>
<td>both</td>
<td>target a <strong>specific</strong> device when several are connected</td>
</tr>
<tr>
<td><code>appium:app</code></td>
<td>both</td>
<td>path/URL to <code>.apk</code>/<code>.ipa</code>/<code>.app</code> → <strong>install + launch</strong></td>
</tr>
<tr>
<td><code>appium:appPackage</code></td>
<td><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/></td>
<td>Android app package id (<code>com.taqelah.demo_app</code>)</td>
</tr>
<tr>
<td><code>appium:appActivity</code></td>
<td><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/></td>
<td>Android activity to launch (<code>.MainActivity</code>)</td>
</tr>
<tr>
<td><code>appium:autoGrantPermissions</code></td>
<td><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/></td>
<td>auto-accept runtime permission dialogs</td>
</tr>
<tr>
<td><code>appium:bundleId</code></td>
<td><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/></td>
<td>iOS app bundle id</td>
</tr>
<tr>
<td><code>appium:noReset</code></td>
<td>both</td>
<td><strong>keep</strong> app data/state between sessions</td>
</tr>
<tr>
<td><code>appium:fullReset</code></td>
<td>both</td>
<td>uninstall + reinstall for a <strong>clean slate</strong></td>
</tr>
<tr>
<td><code>appium:newCommandTimeout</code></td>
<td>both</td>
<td>idle seconds before the server ends the session</td>
</tr>
</tbody>
</table>
<blockquote>
<p>Only a few caps are <strong>W3C-standard</strong> (e.g. <code>platformName</code>); everything vendor-specific is<br />
<strong><code>appium:</code>-prefixed</strong>. Swap these → run the same test on iOS, a real device, or another app.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="two-stacks-one-protocol--whats-the-difference">Two stacks, one protocol — what's the difference?</h2>
<div class="cols">
<div>
<h3 id="%F0%9F%9F%A2-node--webdriverio--mocha"><img class="emoji" draggable="false" alt="🟢" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f7e2.svg" data-marp-twemoji=""/> Node — WebdriverIO + Mocha</h3>
<ul>
<li><strong>WebdriverIO</strong> = a full test <strong>runner / framework</strong></li>
<li><strong>Mocha</strong> = test structure (<code>describe</code> / <code>it</code>)</li>
<li>Runner <strong>auto-creates + quits</strong> the session (<code>wdio.conf.js</code>)</li>
<li><strong>Auto-waiting</strong> built in (<code>$</code>, <code>expect</code>)</li>
</ul>
</div>
<div>
<h3 id="%F0%9F%90%8D-python--appium-python-client--pytest"><img class="emoji" draggable="false" alt="🐍" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f40d.svg" data-marp-twemoji=""/> Python — Appium-Python-Client + pytest</h3>
<ul>
<li><strong>Appium-Python-Client</strong> = a WebDriver <strong>client library</strong></li>
<li><strong>pytest</strong> = test structure (functions + <strong>fixtures</strong>)</li>
<li><strong>You</strong> create + <code>quit()</code> the session (in a fixture)</li>
<li><strong>No auto-wait</strong> — add <code>WebDriverWait</code> / <code>implicitly_wait</code></li>
</ul>
</div>
</div>
<blockquote>
<p><strong>Key difference:</strong> WDIO is a <em>framework</em> that manages session + waits <strong>for you</strong>; the Python stack is a <em>library</em> where <strong>you</strong> drive them. Same WebDriver underneath.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>

<h2 id="the-script--python-pytest">The script — Python (pytest)</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> appium <span class="hljs-keyword">import</span> webdriver
<span class="hljs-keyword">from</span> appium.options.android <span class="hljs-keyword">import</span> UiAutomator2Options
<span class="hljs-keyword">from</span> appium.webdriver.common.appiumby <span class="hljs-keyword">import</span> AppiumBy

<span class="hljs-keyword">def</span> <span class="hljs-title function_">test_settings_opens</span>():
    opts = UiAutomator2Options().load_capabilities({
        <span class="hljs-string">&quot;platformName&quot;</span>: <span class="hljs-string">&quot;Android&quot;</span>,
        <span class="hljs-string">&quot;appium:automationName&quot;</span>: <span class="hljs-string">&quot;UiAutomator2&quot;</span>,
        <span class="hljs-string">&quot;appium:appPackage&quot;</span>: <span class="hljs-string">&quot;com.android.settings&quot;</span>,
        <span class="hljs-string">&quot;appium:appActivity&quot;</span>: <span class="hljs-string">&quot;.Settings&quot;</span>,
    })
    driver = webdriver.Remote(<span class="hljs-string">&quot;http://127.0.0.1:4723&quot;</span>, options=opts)
    <span class="hljs-keyword">try</span>:                                 <span class="hljs-comment"># resource-id = stable locator</span>
        el = driver.find_element(AppiumBy.ID, <span class="hljs-string">&quot;com.android.settings:id/homepage_container&quot;</span>)
        <span class="hljs-keyword">assert</span> el.is_displayed()         <span class="hljs-comment"># <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></span>
    <span class="hljs-keyword">finally</span>:
        driver.quit()
</code></pre>

<h2 id="%F0%9F%A4%96-android-locator-strategies"><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android locator strategies</h2>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>Matches</th>
<th>Example value</th>
</tr>
</thead>
<tbody>
<tr>
<td>accessibility id</td>
<td><code>content-desc</code></td>
<td><code>login-button</code></td>
</tr>
<tr>
<td>id</td>
<td>the <code>resource-id</code></td>
<td><code>com.example:id/username</code></td>
</tr>
<tr>
<td>class name</td>
<td>the widget type</td>
<td><code>android.widget.Button</code></td>
</tr>
<tr>
<td>xpath</td>
<td>a path in the tree</td>
<td><code>//android.widget.EditText[@text=&quot;Email&quot;]</code></td>
</tr>
<tr>
<td><strong>UiAutomator</strong></td>
<td>a <code>UiSelector</code> query</td>
<td><em>see below</em></td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// UiSelector — Android&#x27;s most powerful, fastest native query</span>
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">text</span>(<span class="hljs-string">&quot;Login&quot;</span>)
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">resourceId</span>(<span class="hljs-string">&quot;com.example:id/username&quot;</span>)
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">description</span>(<span class="hljs-string">&quot;login-button&quot;</span>)          <span class="hljs-comment">// content-desc</span>
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">className</span>(<span class="hljs-string">&quot;android.widget.Button&quot;</span>).<span class="hljs-title function_">textContains</span>(<span class="hljs-string">&quot;Log&quot;</span>)
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">resourceId</span>(<span class="hljs-string">&quot;…:id/row&quot;</span>).<span class="hljs-title function_">childSelector</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">text</span>(<span class="hljs-string">&quot;OK&quot;</span>))
<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiScrollable</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">scrollable</span>(<span class="hljs-literal">true</span>)).<span class="hljs-title function_">scrollIntoView</span>(<span class="hljs-keyword">new</span> <span class="hljs-title class_">UiSelector</span>().<span class="hljs-title function_">text</span>(<span class="hljs-string">&quot;Bottom&quot;</span>))
</code></pre>
<p><span class="small">Node: <code>$('android=new UiSelector().text(&quot;Login&quot;)')</code> · Python: <code>AppiumBy.ANDROID_UIAUTOMATOR</code></span></p>

<h2 id="%F0%9F%8D%8E-ios-locator-strategies"><img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS locator strategies</h2>
<table>
<thead>
<tr>
<th>Strategy</th>
<th>Matches</th>
<th>Example value</th>
</tr>
</thead>
<tbody>
<tr>
<td>accessibility id</td>
<td><code>accessibilityIdentifier</code> / <code>name</code></td>
<td><code>login-button</code></td>
</tr>
<tr>
<td>class name</td>
<td>the element type</td>
<td><code>XCUIElementTypeButton</code></td>
</tr>
<tr>
<td><strong>-ios predicate string</strong></td>
<td>an NSPredicate query</td>
<td><em>see below</em></td>
</tr>
<tr>
<td><strong>-ios class chain</strong></td>
<td>a fast, path-like query</td>
<td><em>see below</em></td>
</tr>
<tr>
<td>xpath</td>
<td>a path in the tree</td>
<td><code>//XCUIElementTypeButton[@name=&quot;login&quot;]</code></td>
</tr>
</tbody>
</table>
<div class="cols">
<div>
<p><strong>predicate string</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">type == &#x27;XCUIElementTypeButton&#x27; AND name == &#x27;login&#x27;
label BEGINSWITH &#x27;User&#x27;
value CONTAINS &#x27;foo&#x27;
visible == 1
</code></pre>
</div>
<div>
<p><strong>class chain</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">**/XCUIElementTypeButton[`name == &quot;login&quot;`]
**/XCUIElementTypeCell[2]
**/XCUIElementTypeTextField[`label == &quot;Email&quot;`]
</code></pre>
</div>
</div>
<p><span class="small">Node: <code>$('-ios predicate string:…')</code> / <code>$('-ios class chain:…')</code> · Python: <code>AppiumBy.IOS_PREDICATE</code> / <code>IOS_CLASS_CHAIN</code>. Both are <strong>faster + sturdier than xpath</strong> on iOS.</span></p>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<h2 id="xpath-in-depth-%F0%9F%A7%AD">xpath, in depth <img class="emoji" draggable="false" alt="🧭" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f9ed.svg" data-marp-twemoji=""/></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">//*[@text=&#x27;Login&#x27;]                       descendant + attribute match
/hierarchy/.../android.widget.Button     absolute  ·  // = any depth, / = direct child
//android.widget.Button[@text=&#x27;OK&#x27; and @enabled=&#x27;true&#x27;]    multiple attributes
//*[contains(@text,&#x27;Log&#x27;)]               contains()   ·   starts-with(@text,&#x27;Sign&#x27;)
(//android.widget.EditText)[1]           index — the 1st match (1-based)
</code></pre>
<p><strong>Axes — navigate <em>relative</em> to an element you found:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">//*[@text=&#x27;Email&#x27;]/..                              parent
//*[@text=&#x27;Email&#x27;]/following-sibling::android.widget.EditText   next sibling
//*[@text=&#x27;Submit&#x27;]/preceding-sibling::*           earlier sibling
//*[@text=&#x27;OK&#x27;]/ancestor::android.widget.LinearLayout            any ancestor
</code></pre>
<blockquote>
<p><img class="emoji" draggable="false" alt="🤖" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f916.svg" data-marp-twemoji=""/> Android uses <code>android.widget.*</code> classes; <img class="emoji" draggable="false" alt="🍎" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f34e.svg" data-marp-twemoji=""/> iOS uses <code>XCUIElementType*</code>.<br />
xpath is the <strong>slowest + most brittle</strong> strategy (it walks the whole tree) — prefer it last.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 1</header>
<h2 id="which-locator-should-i-prefer">Which locator should I prefer?</h2>
<ol>
<li><strong>accessibility id</strong> <img class="emoji" draggable="false" alt="🥇" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f947.svg" data-marp-twemoji=""/> — stable, <strong>cross-platform</strong>, set by devs on purpose.</li>
<li><strong>Android:</strong> <strong>id / UiSelector</strong> before xpath.  <strong>iOS:</strong> <strong>predicate string / class chain</strong> before xpath.</li>
<li><strong>xpath</strong> <img class="emoji" draggable="false" alt="🛑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6d1.svg" data-marp-twemoji=""/> — flexible but <strong>slow + brittle</strong> (worst on iOS); breaks when the tree shifts. Last resort.</li>
<li><strong>class name</strong> alone is too broad (many <code>Button</code>s) — combine it or avoid.</li>
</ol>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f4a1.svg" data-marp-twemoji=""/> Rule of thumb: <strong>the more a locator depends on layout, the more it breaks.</strong><br />
Ask your devs to add <code>content-desc</code> / <code>accessibilityIdentifier</code> test ids — it helps everyone.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<header>AI-Assisted Mobile UI Test Automation · Session 1</header>
<h2 id="core-commands--the-verbs-of-a-test">Core commands — the verbs of a test</h2>
<div class="cols">
<div>
<p><strong>Node (WebdriverIO)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-keyword">const</span> el = $(<span class="hljs-string">&#x27;~username&#x27;</span>)
<span class="hljs-keyword">await</span> el.<span class="hljs-title function_">setValue</span>(<span class="hljs-string">&#x27;alice&#x27;</span>)   <span class="hljs-comment">// sendKeys (clears first)</span>
<span class="hljs-keyword">await</span> el.<span class="hljs-title function_">addValue</span>(<span class="hljs-string">&#x27;!&#x27;</span>)       <span class="hljs-comment">// append</span>
<span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~login&#x27;</span>).<span class="hljs-title function_">click</span>()    <span class="hljs-comment">// tap</span>
<span class="hljs-keyword">const</span> t = <span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~msg&#x27;</span>).<span class="hljs-title function_">getText</span>()
<span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~box&#x27;</span>).<span class="hljs-title function_">clearValue</span>()
</code></pre>
</div>
<div>
<p><strong>Python (Appium-Python-Client)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">el = driver.find_element(AppiumBy.ACCESSIBILITY_ID, <span class="hljs-string">&quot;username&quot;</span>)
el.send_keys(<span class="hljs-string">&quot;alice&quot;</span>)        <span class="hljs-comment"># type</span>
driver.find_element(AppiumBy.ACCESSIBILITY_ID, <span class="hljs-string">&quot;login&quot;</span>).click()  <span class="hljs-comment"># tap</span>
t = driver.find_element(AppiumBy.ACCESSIBILITY_ID, <span class="hljs-string">&quot;msg&quot;</span>).text
el.clear()
</code></pre>
</div>
</div>
<blockquote>
<p>Find → <strong>act</strong> (tap / type) → <strong>read</strong> (<code>getText</code>) → assert. That's every test.</p>
</blockquote>

<header>AI-Assisted Mobile UI Test Automation · Session 1</header>
<h2 id="waits--never-use-sleep-%F0%9F%9A%AB%E2%8F%B0">Waits — never use <code>sleep</code> <img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/><img class="emoji" draggable="false" alt="⏰" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/23f0.svg" data-marp-twemoji=""/></h2>
<p>A hard <code>sleep(3)</code> is <strong>slow when it works and flaky when it doesn't</strong>. Wait for a <em>condition</em>.</p>
<div class="cols">
<div>
<p><strong>Implicit</strong> — one global &quot;retry-find for up to N seconds&quot;</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">driver.implicitly_wait(<span class="hljs-number">10</span>)   <span class="hljs-comment"># Python</span>
</code></pre>
<p><strong>Explicit</strong> — wait for a <em>specific</em> condition</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">WebDriverWait(driver, <span class="hljs-number">15</span>).until(
  EC.visibility_of_element_located(
    (AppiumBy.ACCESSIBILITY_ID, <span class="hljs-string">&quot;home&quot;</span>)))
</code></pre>
</div>
<div>
<p><strong>WebdriverIO auto-waits</strong> for you</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-js"><span class="hljs-comment">// $ commands auto-retry; assertions wait too</span>
<span class="hljs-keyword">await</span> $(<span class="hljs-string">&#x27;~home&#x27;</span>).<span class="hljs-title function_">waitForDisplayed</span>()
<span class="hljs-keyword">await</span> <span class="hljs-title function_">expect</span>($(<span class="hljs-string">&#x27;~home&#x27;</span>)).<span class="hljs-title function_">toBeDisplayed</span>()
</code></pre>
</div>
</div>
<blockquote>
<p>Prefer <strong>explicit / condition-based</strong> waits. They make tests fast <em>and</em> reliable.</p>
</blockquote>
<footer>Taqelah Bootcamp · June 2026</footer>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">UA = AppiumBy.ANDROID_UIAUTOMATOR

<span class="hljs-keyword">def</span> <span class="hljs-title function_">test_login_succeeds</span>(<span class="hljs-params">driver</span>):
